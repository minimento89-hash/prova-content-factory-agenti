<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Factory V10 — Launcher</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .launcher-main { max-width: 1200px; margin: 0 auto; padding: 40px; }
    .studi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px; }
    .studio-card { background: white; border-radius: 24px; padding: 24px; box-shadow: var(--shadow-glass); border: 1px solid var(--border-light); position: relative; display: flex; flex-direction: column; min-height: 380px; transition: 0.3s; }
    .studio-card:hover { border-color: var(--accent-primary); box-shadow: var(--shadow-hover); transform: translateY(-5px); }
    .studio-icon-wrap { width: 64px; height: 64px; margin: 40px auto 20px; font-size: 32px; display: flex; align-items: center; justify-content: center; background: var(--bg-core); border-radius: 16px; border: 2px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .studio-title { text-align: center; font-size: 20px; font-weight: 800; font-family: var(--font-serif); }
    .studio-desc { text-align: center; font-size: 13px; color: var(--text-muted); margin: 10px 0 20px; flex: 1; }
    .btn-apri { width: 100%; padding: 12px; background: var(--text-main); color: white; border-radius: 12px; font-weight: 700; text-align: center; text-decoration: none; transition: 0.2s; }
    .btn-apri:hover { background: var(--accent-primary); }
    .new-studio-card { border: 2px dashed rgba(139,92,246,0.3); background: rgba(139,92,246,0.01); border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; min-height: 380px; transition: 0.3s; }
    .new-studio-card:hover { border-color: var(--accent-primary); background: rgba(139,92,246,0.03); }
  </style>
</head>
<body>
  <main class="launcher-main">
    <h1 class="greeting-title">Bentornato, Capo</h1>
    <div class="studi-grid" id="studiGrid">
       <!-- Population via JS -->
    </div>
  </main>

  <script type="module">
    import { applyTranslations } from "./src/core/i18n.js";
    
    // Default mock data if empty
    const defaultStudi = [{ id: 's1', title: 'Studio Alpha', desc: 'Concept Neurale Automizzato', icon: '🚀', color: '#8b5cf6' }];
    if(!localStorage.getItem('v10_studi_cloud')) {
      localStorage.setItem('v10_studi_cloud', JSON.stringify(defaultStudi));
    }

    const dbStudi = JSON.parse(localStorage.getItem('v10_studi_cloud'));

    function renderStudi() {
      const g = document.getElementById('studiGrid');
      if(!g) return;
      g.innerHTML = dbStudi.map(s => `
        <div class="studio-card">
          <div class="studio-icon-wrap" style="color:${s.color}">${s.icon}</div>
          <div class="studio-title">${s.title}</div>
          <div class="studio-desc">${s.desc}</div>
          <a href="studio.html?id=${s.id}" class="btn-apri">Entra nello Studio</a>
        </div>
      `).join('') + `
        <div class="new-studio-card">
          <div style="font-size:32px; margin-bottom:10px;">+</div>
          <div style="font-weight:700;">Nuovo Progetto</div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => { 
      applyTranslations(); 
      renderStudi(); 
      console.log("V10 Launcher Ready.");
    });
  </script>
</body>
</html>
